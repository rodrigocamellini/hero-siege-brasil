<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ether Tree - Mapeador Pro</title>
    <style>
        body { margin: 0; background: #020205; color: #00f2ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        canvas { display: block; cursor: crosshair; }
        
        .info-panel {
            position: absolute; top: 20px; right: 20px;
            width: 250px; background: rgba(0, 15, 30, 0.9);
            border: 1px solid #00f2ff; border-radius: 10px;
            padding: 15px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            pointer-events: none; transition: all 0.3s;
        }

        .info-panel h3 { margin: 0 0 10px 0; font-size: 16px; border-bottom: 1px solid #00f2ff; padding-bottom: 5px; }
        .info-item { margin-bottom: 8px; font-size: 13px; }
        .info-label { color: rgba(0, 242, 255, 0.6); text-transform: uppercase; font-size: 10px; display: block; }
        .info-value { color: #fff; font-size: 14px; font-weight: bold; }
        .status-active { color: #00ff88; }
        .status-inactive { color: #ff4444; }

        .toolbar { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0, 15, 30, 0.95); 
            padding: 12px 25px; border: 1px solid #00f2ff; border-radius: 50px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); align-items: center; z-index: 10;
        }

        .stat { font-size: 14px; font-weight: bold; min-width: 90px; }
        .stat span { color: #fff; text-shadow: 0 0 10px #00f2ff; }
        
        button { 
            background: rgba(0, 242, 255, 0.1); border: 1px solid #00f2ff; color: #00f2ff;
            padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold;
            transition: all 0.2s;
        }
        button:hover { background: #00f2ff; color: #000; }
        button.danger:hover { background: #ff4444; border-color: #ff4444; color: #fff; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none;
            justify-content: center; align-items: center; z-index: 100;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #050510; border: 2px solid #00f2ff; padding: 30px;
            border-radius: 20px; text-align: center; max-width: 350px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="info-panel" id="infoPanel">
        <h3>Detalhes do Node</h3>
        <div class="info-item"><span class="info-label">ID do Ponto</span><span class="info-value" id="valID">-</span></div>
        <div class="info-item"><span class="info-label">Nome do Node</span><span class="info-value" id="valName">-</span></div>
        <div class="info-item"><span class="info-label">Status Atual</span><span class="info-value" id="valStatus">-</span></div>
    </div>

    <div class="toolbar">
        <div class="stat">Ativos: <span id="activeCount">0</span></div>
        <button onclick="selectAllNodes()">Selecionar Tudo</button>
        <button class="danger" onclick="toggleModal(true)">Resetar Árvore</button>
    </div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal-content">
            <h2>Reiniciar Árvore?</h2>

            <div class="modal-buttons">
                <button onclick="toggleModal(false)">Cancelar</button>
                <button class="danger" onclick="resetTree()">Confirmar</button>
            </div>
        </div>
    </div>

    let savedActive = JSON.parse(localStorage.getItem('etherTree_active')) || [0];
    const nodes = rawData.map((p, i) => ({
        id: i,
        name: getNodeName(i),
        x: Math.round(p.x),
        y: Math.round(p.y),
        active: savedActive.includes(i)
    }));

    let scale = 0.8, offX = window.innerWidth/2, offY = window.innerHeight/2;
    let isDrag = false, lastM = {x:0, y:0}, hasMoved = false;

    function saveState() {
        localStorage.setItem('etherTree_active', JSON.stringify(nodes.filter(n => n.active).map(n => n.id)));
    }

    function canToggle(node) {
        if (node.id === 0) return false;
        if (!node.active) {
            return connections.some(c => (c.from === node.id && nodes[c.to].active) || (c.to === node.id && nodes[c.from].active));
        } else {
            const testSet = new Set(nodes.filter(n => n.active && n.id !== node.id).map(n => n.id));
            const reachable = new Set([0]);
            let growing = true;
            while(growing) {
                let sizeBefore = reachable.size;
                connections.forEach(c => {
                    if (testSet.has(c.from) && reachable.has(c.to)) reachable.add(c.from);
                    if (testSet.has(c.to) && reachable.has(c.from)) reachable.add(c.to);
                });
                if (reachable.size === sizeBefore) growing = false;
            }
            return reachable.size === (testSet.size + 1);
        }
    }

    function toggleNode(node) {
        if (canToggle(node)) {
            node.active = !node.active;
            saveState();
            updateUI(node);
            render();
        }
    }

    function selectAllNodes() {
        nodes.forEach(n => n.active = true);
        saveState();
        render();
    }

    function toggleModal(show) {
        document.getElementById('confirmModal').style.display = show ? 'flex' : 'none';
    }

    function resetTree() { 
        nodes.forEach((n,i) => n.active = i===0); 
        saveState(); 
        toggleModal(false);
        render(); 
    }

    function updateUI(node) {
        document.getElementById('valID').innerText = node.id;
        document.getElementById('valName').innerText = node.name;
        const statusEl = document.getElementById('valStatus');
        statusEl.innerText = node.active ? "ATIVO" : "INATIVO";
        statusEl.className = "info-value " + (node.active ? "status-active" : "status-inactive");
    }

    function render() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offX, offY);
        ctx.scale(scale, scale);

        connections.forEach(c => {
            const n1 = nodes[c.from], n2 = nodes[c.to];
            if (!n1 || !n2) return;
            ctx.beginPath();
            ctx.moveTo(n1.x - CENTER_ORIGIN.x, n1.y - CENTER_ORIGIN.y);
            ctx.lineTo(n2.x - CENTER_ORIGIN.x, n2.y - CENTER_ORIGIN.y);
            ctx.strokeStyle = (n1.active && n2.active) ? "#00f2ff" : "rgba(0, 242, 255, 0.05)";
            ctx.lineWidth = (n1.active && n2.active) ? 2.5 : 1;
            ctx.stroke();
        });

        nodes.forEach(n => {
            const rx = n.x - CENTER_ORIGIN.x, ry = n.y - CENTER_ORIGIN.y;
            if(n.active) {
                ctx.beginPath();
                ctx.arc(rx, ry, 10, 0, Math.PI*2);
                ctx.fillStyle = "rgba(0, 242, 255, 0.2)";
                ctx.fill();
            }
            ctx.beginPath();
            ctx.arc(rx, ry, n.id === 0 ? 10 : 5, 0, Math.PI*2);
            ctx.fillStyle = n.id === 0 ? "#ffcc00" : (n.active ? "#00f2ff" : "#1a1a2e");
            ctx.fill();
            ctx.strokeStyle = n.active ? "#fff" : "#00f2ff33";
            ctx.stroke();

            // O BLOCO DE TEXTO FOI REMOVIDO PARA QUE OS IDs NÃO APAREÇAM NA ÁRVORE
        });
        ctx.restore();

        const ativosReais = nodes.filter(n => n.active && n.id !== 0).length;
        document.getElementById('activeCount').innerText = ativosReais;
    }

    canvas.onmousedown = (e) => { 
        if(e.target === canvas) { isDrag = true; hasMoved = false; lastM = {x: e.clientX, y: e.clientY}; }
    };
    
    window.onmousemove = (e) => {
        const mx = (e.clientX - offX)/scale + CENTER_ORIGIN.x;
        const my = (e.clientY - offY)/scale + CENTER_ORIGIN.y;
        const hovered = nodes.find(n => Math.hypot(n.x - mx, n.y - my) < (15 / scale));
        if(hovered) updateUI(hovered);

        if(isDrag) {
            offX += e.clientX - lastM.x; offY += e.clientY - lastM.y;
            lastM = {x: e.clientX, y: e.clientY};
            hasMoved = true; render();
        }
    };

    window.onmouseup = (e) => {
        if(!hasMoved && isDrag) {
            const mx = (e.clientX - offX)/scale + CENTER_ORIGIN.x;
            const my = (e.clientY - offY)/scale + CENTER_ORIGIN.y;
            const clicked = nodes.find(n => Math.hypot(n.x - mx, n.y - my) < (15 / scale));
            if(clicked) toggleNode(clicked);
        }
        isDrag = false;
    };

    window.onwheel = (e) => { 
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale *= delta; 
        render(); 
    };

    render();
    window.onresize = render;
</script>
